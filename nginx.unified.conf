# ============================================================
# NEXUS GESTÃO — nginx.unified.conf
# Container unificado: Nginx serve o frontend e faz proxy
# para o backend Node.js que roda internamente na porta 3001
# ============================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M;

    # ── Compressão Gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # ── Proxy para a API do backend (Node.js interno) ────────
    # Backend roda na porta 3001 dentro do mesmo container
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        # Retorna JSON de erro em vez de página HTML do nginx
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_unavailable;
    }

    location @backend_unavailable {
        default_type application/json;
        return 503 '{"error":"Serviço temporariamente indisponível. Aguarde alguns instantes."}';
    }

    # ── Proxy para uploads (servidos pelo backend) ───────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        add_header         Cache-Control "public, max-age=2592000";
    }

    # ── Service Worker — nunca cachear ───────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location ~* workbox.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Manifest PWA ─────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }


    # ── Recuperação de chunks JS antigos ─────────────────────
    # Quando o navegador fica com index.html antigo em cache, ele pode pedir
    # /assets/index-*.js que não existe mais no deploy novo. Em vez de deixar
    # a aplicação em tela branca com 404, entregamos um JS pequeno que limpa
    # caches/service workers antigos e recarrega a rota atual uma única vez.
    location ~* ^/assets/.*\.js$ {
        try_files $uri @vite_js_missing;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location @vite_js_missing {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        return 200 '(() => { const k="nexus_asset_recovery_at"; const now=Date.now(); try { const last=Number(sessionStorage.getItem(k)||"0"); if (last && now-last<15000) { console.error("Nexus asset ausente após reload protegido."); return; } sessionStorage.setItem(k,String(now)); } catch(e) {} const jobs=[]; if ("serviceWorker" in navigator) jobs.push(navigator.serviceWorker.getRegistrations().then(rs=>Promise.all(rs.map(r=>r.unregister()))).catch(()=>{})); if ("caches" in window) jobs.push(caches.keys().then(ks=>Promise.all(ks.map(c=>caches.delete(c)))).catch(()=>{})); Promise.all(jobs).finally(() => { const u=new URL(location.href); u.searchParams.set("_nexus_reload", String(now)); location.replace(u.toString()); }); })();';
    }

    # CSS antigo não deve bloquear a abertura do app.
    location ~* ^/assets/.*\.css$ {
        try_files $uri @vite_css_missing;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location @vite_css_missing {
        default_type text/css;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        return 200 '';
    }

    # ── Imagens e fontes ─────────────────────────────────────
    location ~* \.(png|svg|ico|woff2|woff|ttf|webp)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA: todas as rotas → index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Headers de segurança ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
