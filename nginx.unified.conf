# ============================================================
# NEXUS GESTÃO — nginx.unified.conf
# Container unificado: Nginx serve o frontend (porta 80)
# e faz proxy para o Node.js interno (porta 3001)
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # ── Compressão Gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # ── Health check (rota /health → backend interno) ────────
    location = /health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Proxy para a API do backend ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy para uploads (arquivos do backend) ─────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=2592000";
    }

    # ── Service Worker — nunca cachear ───────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location ~* workbox.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Manifest PWA ─────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # ── Assets com hash (JS/CSS do Vite) — cache longo ──────
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Imagens e fontes ─────────────────────────────────────
    location ~* \.(png|svg|ico|woff2|woff|ttf|webp)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA fallback: todas as rotas → index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Headers de segurança ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
