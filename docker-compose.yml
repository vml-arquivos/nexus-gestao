version: '3.9'

# ============================================================
# NEXUS GESTÃO — Docker Compose para Coolify/VPS
# Serviços: frontend (nginx+react) + backend (node+express)
# Banco: PostgreSQL 17 externo na VPS (via DATABASE_URL)
# SSL/HTTPS: gerenciado pelo Coolify (Traefik integrado)
# ============================================================

services:

  # ── BACKEND — Node.js + Express + JWT ──────────────────────
  nexus-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-https://nexus.permupay.com.br}
      UPLOADS_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
    volumes:
      - nexus-uploads:/app/uploads
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── FRONTEND — React + Vite + Nginx ────────────────────────
  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    depends_on:
      nexus-backend:
        condition: service_healthy
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  nexus-uploads:
    driver: local

networks:
  nexus-net:
    driver: bridge
