<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ═══ VIEWPORT: trava zoom, trava escala — comportamento de app nativo ═══ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ═══ PWA / App-like meta tags ═══ -->
    <meta name="theme-color" content="#0F0A1E" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0F0A1E" />
    <meta name="description" content="Gestão de equipe, tarefas, agenda e financeiro em um só lugar" />

    <!-- iOS: faz o app parecer instalado como app nativo -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexus" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Nexus" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Previne callout do iOS ao segurar um link -->
    <meta name="format-detection" content="telephone=no" />

    <title>Nexus — Gestão Inteligente</title>

    <!-- Google Fonts: Poppins + Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ═══ CRITICAL: Estilos inline para splash / loading ═══ -->
    <style>
      /* Impede qualquer bounce/overscroll — comportamento nativo */
      html, body {
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y;
        -webkit-user-select: none;
        user-select: none;
        height: 100%;
        height: 100dvh;
      }
      /* Permite seleção em inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Remove highlight ao tocar em iOS */
      * { -webkit-tap-highlight-color: transparent; }

      /* Splash screen enquanto o app carrega */
      #splash {
        position: fixed;
        inset: 0;
        background: #0F0A1E;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #6C3BFF, #06B6D4);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px rgba(108,59,255,0.5);
        margin-bottom: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-logo svg { width: 36px; height: 36px; fill: none; stroke: white; stroke-width: 2; }
      #splash-name {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 28px;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #6C3BFF, #06B6D4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #splash-sub {
        font-family: 'Poppins', sans-serif;
        font-size: 12px;
        color: #8B7EC8;
        margin-top: 4px;
        font-weight: 500;
      }
      #splash-loader {
        position: absolute;
        bottom: calc(40px + env(safe-area-inset-bottom));
        width: 120px; height: 3px;
        background: rgba(108,59,255,0.2);
        border-radius: 99px;
        overflow: hidden;
      }
      #splash-loader::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #6C3BFF, #06B6D4);
        border-radius: 99px;
        animation: loaderSlide 1.2s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(108,59,255,0.5); }
        50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(108,59,255,0.7); }
      }
      @keyframes loaderSlide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(150%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen nativa -->
    <div id="splash">
      <div id="splash-logo">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div id="splash-name">Nexus</div>
      <div id="splash-sub">Gestão Inteligente</div>
      <div id="splash-loader"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Esconde splash quando o app React tiver montado
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function(){ s.remove(); }, 450);
        }
      };
      // Fallback: esconde após 3s mesmo sem o React sinalizar
      setTimeout(window.__hideSplash, 3000);
    </script>
  </body>
</html>
