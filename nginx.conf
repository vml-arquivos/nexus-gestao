# ============================================================
# NEXUS — nginx.conf
# SPA routing + PWA cache headers + Gzip
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão Gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── Service Worker — nunca cachear ───────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location = /workbox-*.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Manifest PWA ─────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # ── Assets com hash (JS/CSS do Vite) — cache longo ──────
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Imagens e fontes ─────────────────────────────────────
    location ~* \.(png|svg|ico|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA: todas as rotas → index.html ─────────────────────
    # Essencial para o React Router funcionar
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Headers de segurança ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
