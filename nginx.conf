# ============================================================
# NEXUS GESTÃO — nginx.conf
# SPA routing + Proxy para API backend + PWA + Gzip
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # ── Compressão Gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # ── Proxy para a API do backend ──────────────────────────
    # O backend roda no container "nexus-backend" na porta 3001
    location /api/ {
        proxy_pass         http://nexus-backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy para uploads (arquivos estáticos do backend) ───
    location /uploads/ {
        proxy_pass         http://nexus-backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        # Cache de uploads por 30 dias
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Service Worker — nunca cachear ───────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location ~* workbox.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Manifest PWA ─────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # ── Assets com hash (JS/CSS do Vite) — cache longo ──────
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Imagens e fontes ─────────────────────────────────────
    location ~* \.(png|svg|ico|woff2|woff|ttf|webp)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA: todas as rotas → index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Headers de segurança ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
